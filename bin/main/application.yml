spring:
  application:
    name: msp-overlay-server
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/msp_overlay}
    username: ${DB_USERNAME:msp_user}
    password: ${DB_PASSWORD:msp_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
        ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080
