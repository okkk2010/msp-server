name: msp-overlay

services:
  app:
    build:
      context: .
    container_name: msp-overlay-app
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      DB_URL: ${APP_DB_URL:-jdbc:postgresql://postgres:5432/${POSTGRES_DB:-msp_overlay}}
      DB_USERNAME: ${DB_USERNAME:-msp_user}
      DB_PASSWORD: ${DB_PASSWORD:-msp_password}
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-local-dev-jwt-secret-2026}
      JWT_ACCESS_TOKEN_EXPIRATION_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRATION_DAYS: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:-14}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*}      
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      FRONTEND_LOGIN_CALLBACK_PATH: ${FRONTEND_LOGIN_CALLBACK_PATH:-/login/callback}
      APP_STORAGE_BASE_PATH: ${APP_STORAGE_BASE_PATH:-storage}
      SERVER_FORWARD_HEADERS_STRATEGY: ${SERVER_FORWARD_HEADERS_STRATEGY:-framework}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID:-}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET:-}
    ports:
      - "8080:8080"
    volumes:
      - app_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: msp-overlay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-msp_overlay}
      POSTGRES_USER: ${POSTGRES_USER:-msp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-msp_password}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-msp_user} -d ${POSTGRES_DB:-msp_overlay}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  app_storage:
  postgres_data:
