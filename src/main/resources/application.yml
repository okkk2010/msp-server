spring:
  application:
    name: msp-overlay-server
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/msp_overlay}
    username: ${DB_USERNAME:msp_user}
    password: ${DB_PASSWORD:msp_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
        ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080

app:
  jwt: 
    secret: ${JWT_SECRET:local-dev-jwt-secret-local-dev-jwt-secret-2026}
    access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:30}
    refresh-token-expiration-days: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:14}
  cors:
    allowed-origins:
      - ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
    allowed-origin-patterns:
      - ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
  frontend:
    origin: ${FRONTEND_ORIGIN:http://localhost:5173}
    login-callback-path: ${FRONTEND_LOGIN_CALLBACK_PATH:/login/callback}
  storage:
    base-path: ${APP_STORAGE_BASE_PATH:storage}
